<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Dashboard</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        background:
            radial-gradient(circle at top left,#8b5cf6 0%,transparent 30%),
            radial-gradient(circle at bottom right,#06b6d4 0%,transparent 30%),
            linear-gradient(135deg,#0f172a,#111827);
        font-family:'Segoe UI',sans-serif;
        color:white;
    }

    .container-custom{
        max-width:1100px;
        margin:40px auto;
        padding:20px;
    }

    .glass-card{
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(20px);
        -webkit-backdrop-filter:blur(20px);

        border:1px solid rgba(255,255,255,0.15);

        border-radius:24px;

        padding:30px;

        box-shadow:
            0 8px 32px rgba(0,0,0,0.35),
            inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .navbar-glass{
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(20px);
        border:1px solid rgba(255,255,255,0.15);

        border-radius:20px;

        padding:20px 25px;
        margin-bottom:25px;

        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .logo{
        font-size:1.8rem;
        font-weight:700;

        background:linear-gradient(
            135deg,
            #8b5cf6,
            #06b6d4
        );

        background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .form-control,
    .form-select{
        background:rgba(255,255,255,0.08) !important;
        border:1px solid rgba(255,255,255,0.15) !important;
        color:white !important;
        border-radius:14px;
        padding:12px;
    }

    .form-control::placeholder{
        color:#cbd5e1;
    }

    .form-control:focus,
    .form-select:focus{
        border-color:#8b5cf6 !important;
        box-shadow:0 0 0 0.2rem rgba(139,92,246,0.25);
    }

    .form-select option{
        background:#111827;
        color:white;
    }

    .btn-gradient{
        background:linear-gradient(
            135deg,
            #8b5cf6,
            #06b6d4
        );

        border:none;
        border-radius:14px;
        color:white;
        font-weight:600;
        padding:12px;
    }

    .btn-gradient:hover{
        transform:translateY(-2px);
        transition:0.3s;
    }

    .btn-history{
        background:#06b6d4;
        border:none;
        color:white;
    }

    .btn-logout{
        background:#ef4444;
        border:none;
        color:white;
    }

    .section-title{
        font-size:1.3rem;
        font-weight:600;
        margin-bottom:20px;
    }

    #loadingOverlay{
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;

        background:rgba(0,0,0,0.8);

        z-index:9999;

        justify-content:center;
        align-items:center;
        flex-direction:column;

        color:white;
    }
</style>
```

</head>
<body>

<div class="container-custom">

```
<div class="navbar-glass">

    <div class="logo">
        AI Content Generator
    </div>

    <div>
        <a href="/history" class="btn btn-history me-2">
            History
        </a>

        <a href="/logout"
           class="btn btn-logout"
           onclick="return confirm('Logout?')">
            Logout
        </a>
    </div>

</div>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<div class="glass-card">

    <div class="section-title">
        Generate AI Article
    </div>

    <form method="POST">

        <div class="mb-3">
            <label class="mb-2">Website URL</label>

            <input
                type="url"
                name="url"
                class="form-control"
                placeholder="https://example.com/article"
                required>
        </div>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="mb-2">Audience</label>

                <select name="audience" class="form-select">

                    <option>General</option>
                    <option>Students</option>
                    <option>Researchers</option>
                    <option>Developers</option>

                </select>

            </div>

            <div class="col-md-6 mb-3">

                <label class="mb-2">Writing Style</label>

                <select name="style" class="form-select">

                    <option>Professional</option>
                    <option>Technical</option>
                    <option>Casual</option>
                    <option>SEO</option>

                </select>

            </div>

        </div>

        <div class="mb-4">

            <label class="mb-2">Word Count</label>

            <input
                type="number"
                name="word_count"
                class="form-control"
                value="500"
                min="100"
                max="5000">

        </div>

        <button
            type="submit"
            id="generateBtn"
            class="btn btn-gradient w-100">

            Generate Article

        </button>

    </form>

</div>
```

</div>

<div id="loadingOverlay">

```
<div class="spinner-border text-light mb-3"></div>

<h4>Generating your article...</h4>

<p>Please wait a few seconds</p>
```

</div>

<script>
document.querySelector("form").addEventListener("submit", function(){

    document.getElementById("loadingOverlay").style.display = "flex";

    document.getElementById("generateBtn").disabled = true;

    document.getElementById("generateBtn").innerText = "Generating...";
});
</script>

</body>
</html>
