<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        background:
            radial-gradient(circle at top left,#8b5cf6 0%,transparent 30%),
            radial-gradient(circle at bottom right,#06b6d4 0%,transparent 30%),
            linear-gradient(135deg,#0f172a,#111827);

        font-family:'Segoe UI',sans-serif;
        color:white;
        padding:40px 20px;
    }

    .container-custom{
        max-width:1100px;
        margin:auto;
    }

    .glass-card{
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(20px);
        -webkit-backdrop-filter:blur(20px);

        border:1px solid rgba(255,255,255,0.15);

        border-radius:24px;

        padding:35px;

        box-shadow:
            0 8px 32px rgba(0,0,0,0.35),
            inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .title{
        font-size:2rem;
        font-weight:700;
        margin-bottom:25px;

        background:linear-gradient(
            135deg,
            #8b5cf6,
            #06b6d4
        );

        background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .article-content{
        white-space:pre-wrap;
        line-height:1.9;
        font-size:1rem;
        color:#e5e7eb;

        background:rgba(255,255,255,0.04);
        border:1px solid rgba(255,255,255,0.08);

        border-radius:18px;
        padding:25px;

        max-height:650px;
        overflow-y:auto;
    }

    .button-group{
        margin-top:25px;
        display:flex;
        gap:12px;
        flex-wrap:wrap;
    }

    .btn-gradient{
        background:linear-gradient(
            135deg,
            #8b5cf6,
            #06b6d4
        );

        border:none;
        color:white;
        font-weight:600;
        border-radius:14px;
        padding:12px 18px;
    }

    .btn-gradient:hover{
        transform:translateY(-2px);
        transition:0.3s;
    }

    .btn-secondary-custom{
        background:#334155;
        border:none;
        color:white;
        border-radius:14px;
        padding:12px 18px;
    }

    .btn-success-custom{
        background:#10b981;
        border:none;
        color:white;
        border-radius:14px;
        padding:12px 18px;
    }
</style>
```

</head>
